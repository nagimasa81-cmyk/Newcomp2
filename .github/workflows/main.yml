
name: Build Complaint Service Hub Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --noconfirm --onedir --windowed --name Complaint_Service_Hub_Launcher ^
            --hidden-import=tkinter ^
            --hidden-import=tkinter.ttk ^
            --hidden-import=tkinter.filedialog ^
            --hidden-import=tkinter.messagebox ^
            --hidden-import=tkinter.scrolledtext ^
            launcher.py

      - name: Copy application files
        shell: cmd
        run: |
          xcopy /E /I /Y config dist\Complaint_Service_Hub_Launcher\config
          xcopy /E /I /Y masters dist\Complaint_Service_Hub_Launcher\masters
          xcopy /E /I /Y templates dist\Complaint_Service_Hub_Launcher\templates
          xcopy /E /I /Y profiles dist\Complaint_Service_Hub_Launcher\profiles

          if exist resources (
            xcopy /E /I /Y resources dist\Complaint_Service_Hub_Launcher\resources
          )

          copy /Y hub_app.py dist\Complaint_Service_Hub_Launcher\
          copy /Y launcher.py dist\Complaint_Service_Hub_Launcher\
          copy /Y main.py dist\Complaint_Service_Hub_Launcher\
          copy /Y manifest.json dist\Complaint_Service_Hub_Launcher\
          copy /Y app_version.json dist\Complaint_Service_Hub_Launcher\

          mkdir dist\Complaint_Service_Hub_Launcher\logs 2>nul
          mkdir dist\Complaint_Service_Hub_Launcher\records 2>nul
          mkdir dist\Complaint_Service_Hub_Launcher\updates 2>nul
          mkdir dist\Complaint_Service_Hub_Launcher\backups 2>nul

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Complaint_Service_Hub_Launcher
          path: dist/Complaint_Service_Hub_Launcher/**
